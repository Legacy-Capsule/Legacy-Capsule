<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Legacy Capsule</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>Preserve What Matters — For Those Who Come After</h1>
    
    <div class="earth-container">
      <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/9/97/The_Earth_seen_from_Apollo_17.jpg/1200px-The_Earth_seen_from_Apollo_17.jpg" alt="Earth from Space" id="earth">
    </div>

    <p class="message">
      Love Truth. Seek it out. Protect it with your life.<br>
      For everything that matters is found within it and nothing matters without it.
    </p>

    <button class="buy-btn">Buy Land on Earth</button>

    <p class="countdown">Remaining Land: <span id="remaining">5,000,000</span></p>
  </div>

  <script src="script.js"></script>
</body>
</html>
